name: Website E2E

on:
  workflow_dispatch:
    inputs:
      e2e_base_url:
        description: "Base URL to test (staging or preview)"
        required: true
        type: string
      e2e_commit_sha:
        description: "Optional commit hash for compatibility matrix"
        required: false
        type: string

jobs:
  playwright-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Install Playwright browsers
        working-directory: website
        run: npm run e2e:install

      - name: Run Website E2E
        working-directory: website
        env:
          E2E_BASE_URL: ${{ inputs.e2e_base_url }}
          E2E_COMMIT_SHA: ${{ inputs.e2e_commit_sha }}

          E2E_CITIZEN_EMAIL: ${{ secrets.E2E_CITIZEN_EMAIL }}
          E2E_CITIZEN_PASSWORD: ${{ secrets.E2E_CITIZEN_PASSWORD }}
          E2E_BARANGAY_EMAIL: ${{ secrets.E2E_BARANGAY_EMAIL }}
          E2E_BARANGAY_PASSWORD: ${{ secrets.E2E_BARANGAY_PASSWORD }}
          E2E_CITY_EMAIL: ${{ secrets.E2E_CITY_EMAIL }}
          E2E_CITY_PASSWORD: ${{ secrets.E2E_CITY_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}

          E2E_SCENARIO_CHROMIUM: ${{ secrets.E2E_SCENARIO_CHROMIUM }}
          E2E_SCENARIO_FIREFOX: ${{ secrets.E2E_SCENARIO_FIREFOX }}
          E2E_SCENARIO_PIXEL5: ${{ secrets.E2E_SCENARIO_PIXEL5 }}
          E2E_SCENARIO_IPHONE13: ${{ secrets.E2E_SCENARIO_IPHONE13 }}

          E2E_AIP_PDF_PATH_CHROMIUM: ${{ secrets.E2E_AIP_PDF_PATH_CHROMIUM }}
          E2E_AIP_PDF_PATH_FIREFOX: ${{ secrets.E2E_AIP_PDF_PATH_FIREFOX }}
          E2E_AIP_PDF_PATH_PIXEL5: ${{ secrets.E2E_AIP_PDF_PATH_PIXEL5 }}
          E2E_AIP_PDF_PATH_IPHONE13: ${{ secrets.E2E_AIP_PDF_PATH_IPHONE13 }}
        run: npm run e2e

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-playwright-evidence
          path: |
            evidence-pack/01-functional/playwright-report
            evidence-pack/03-compatibility/playwright-matrix.md
          if-no-files-found: warn
